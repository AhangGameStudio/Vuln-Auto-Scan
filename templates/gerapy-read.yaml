id: gerapy-read-----------
info:
  author: pocscanner
  description: Gerapy gerapy/server/core/views.py 中的 project_file_read 方法存在任意文件读取，攻击者登录后台后发送特定的请求包即可利用漏洞
  name: Gerapy read 后台任意文件读取漏洞
  reference: []
  severity: medium
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/api/project/file/read'
