id: influxdb--------
info:
  author: pocscanner
  description: 'influxdb是一款著名的时序数据库，其使用jwt作为鉴权方式。在用户开启了认证，但未设置参数`shared-secret`的情况下，jwt的认证密钥为空字符串，此时攻击者可以伪造任意用户身份在influxdb中执行SQL语句。


    JWT，全称是JSON Web Token，是一种易于使用、无状态的鉴权方式。简单来说，就是Server端把JSON数据经过加密做成token，以授权给Client端。


    参考链接：


    - https://www.komodosec.com/post/when-all-else-fails-find-a-0-day

    - https://docs.influxdata.com/influxdb/v1.7/administration/config/#http-endpoints-settings'
  name: InfluxDB 未授权访问漏洞
  reference:
  - https://www.komodosec.com/post/when-all-else-fails-find-a-0-day
  - https://docs.influxdata.com/influxdb/v1.7/administration/config/#http-endpoints-settings
  severity: high
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
