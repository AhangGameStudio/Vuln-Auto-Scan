id: atlassian-bitbucket-------
info:
  author: pocscanner
  description: 此错误已修复并部署在 Bitbucket Server > 4.8 上。Bitbucket 由 Atlassian 团队开发。其中出现了一个通过
    %20 绕过权限的漏洞，导致任意用户可获取敏感数据
  name: Atlassian Bitbucket 登录绕过漏洞
  reference: []
  severity: low
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
