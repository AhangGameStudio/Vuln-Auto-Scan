id: struts2-s2-013---------
info:
  author: pocscanner
  description: 'Struts2 标签中 `<s:a>` 和 `<s:url>` 都包含一个 includeParams 属性，其值可设置为 none，get
    或 all，参考官方其对应意义如下：


    1. none - 链接不包含请求的任意参数值（默认）

    2. get - 链接只包含 GET 请求中的参数和其值

    3. all - 链接包含 GET 和 POST 所有参数和其值


    `<s:a>`用来显示一个超链接，当`includeParams=all`的时候，会将本次请求的GET和POST参数都放在URL的GET参数上。在放置参数的过程中会将参数进行OGNL渲染，造成任意命令执行漏洞。


    漏洞详情:


    - http://struts.apache.org/docs/s2-013.html

    - http://struts.apache.org/docs/s2-014.html'
  name: Struts2 S2-013 远程代码执行漏洞
  reference:
  - http://struts.apache.org/docs/s2-013.html
  - http://struts.apache.org/docs/s2-014.html
  severity: critical
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/link.action'
