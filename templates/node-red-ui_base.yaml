id: node-red-ui_base---------
info:
  author: pocscanner
  description: 'Node-RED 在/nodes/ui_base.js中，URL与''/ui_base/js/*''匹配，然后传递给path.join，


    缺乏对最终路径的验证会导致路径遍历漏洞，可以利用这个漏洞读取服务器上的敏感数据，比如settings.js'
  name: Node-RED ui_base 任意文件读取漏洞
  reference: []
  severity: medium
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
