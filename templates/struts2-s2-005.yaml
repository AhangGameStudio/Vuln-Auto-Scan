id: struts2-s2-005---------
info:
  author: pocscanner
  description: "参考吴翰清的《白帽子讲Web安全》一书。\n\n> s2-005漏洞的起源源于S2-003(受影响版本: 低于Struts 2.0.12)，struts2会将http的每个参数名解析为OGNL语句执行(可理解为java代码)。OGNL表达式通过#来访问struts的对象，struts框架通过过滤#字符防止安全问题，然而通过unicode编码(\\\
    u0023)或8进制(\\43)即绕过了安全限制，对于S2-003漏洞，官方通过增加安全配置(禁止静态方法调用和类方法执行等)来修补，但是安全配置被绕过再次导致了漏洞，攻击者可以利用OGNL表达式将这2个选项打开，S2-003的修补方案把自己上了一个锁，但是把锁钥匙给插在了锁头上\n\
    \nXWork会将GET参数的键和值利用OGNL表达式解析成Java语句，如：\n\n```\nuser.address.city=Bishkek&user['favoriteDrink']=kumys\
    \ \n//会被转化成\naction.getUser().getAddress().setCity(\"Bishkek\")  \naction.getUser().setFavoriteDri"
  name: Struts2 S2-005 远程代码执行漏洞
  reference:
  - http://struts.apache.org/docs/s2-005.html
  severity: critical
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/example/HelloWorld.action'
