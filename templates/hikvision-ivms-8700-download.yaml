id: hikvision-ivms-8700---------download---------
info:
  author: pocscanner
  description: Hikvision iVMS-8700综合安防管理平台存在任意文件读取漏洞，攻击者通过发送特定的请求包可以读取服务器中的敏感文件获取服务器信息
  name: Hikvision iVMS-8700综合安防管理平台 download 任意文件下载漏洞
  reference: []
  severity: medium
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/api/triggerSnapshot/download'
