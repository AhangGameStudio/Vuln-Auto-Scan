id: uwsgi--------
info:
  author: pocscanner
  description: 'uWSGI是一款Web应用程序服务器，它实现了WSGI、uwsgi和http等协议，并支持通过插件来运行各种语言，通常被用于运行Python
    WEB应用。uwsgi除了是应用容器的名称之外，它和Fastcgi之类的一样，也是前端server与后端应用容器之间的一个交流标准。目前nginx，apache也支持uwsgi协议进行代理转发请求。


    uWSGI支持通过魔术变量（Magic Variables）的方式动态配置后端Web应用。如果其端口暴露在外，攻击者可以构造uwsgi数据包，并指定魔术变量`UWSGI_FILE`，运用`exec://`协议执行任意命令。


    参考链接：


    - https://github.com/wofeiwo/webcgi-exploits/blob/master/python/uwsgi-rce-zh.md

    - https://xz.aliyun.com/t/3512

    - https://uwsgi-docs.readthedocs.io/en/latest/Vars.html'
  name: uWSGI 未授权访问漏洞
  reference:
  - https://github.com/wofeiwo/webcgi-exploits/blob/master/python/uwsgi-rce-zh.md
  - https://xz.aliyun.com/t/3512
  - https://uwsgi-docs.readthedocs.io/en/latest/Vars.html
  severity: critical
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
