id: grafana----ssrf
info:
  author: pocscanner
  description: 'Grafana是一个开源的度量分析与可视化套件。在其管理后台中存在一个功能，攻击者可以用于向任意地址发送HTTP请求，且支持自定义HTTP
    Header。


    参考链接：


    - https://github.com/RandomRobbieBF/grafana-ssrf'
  name: Grafana管理后台SSRF
  reference:
  - https://github.com/RandomRobbieBF/grafana-ssrf
  severity: critical
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
