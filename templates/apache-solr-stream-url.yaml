id: apache-solr-stream-url---------
info:
  author: pocscanner
  description: "Apache Solr 存在任意文件读取漏洞，攻击者可以在未授权的情况下获取目标服务器敏感文件。\n\n参考链接：\n\n- Apache\
    \ Solr 组件安全概览 https://mp.weixin.qq.com/s/3WuWUGO61gM0dBpwqTfenQ \n- https://mp.weixin.qq.com/s/HMtAz6_unM1PrjfAzfwCUQ"
  name: Apache Solr stream.url 任意文件读取漏洞
  reference:
  - https://mp.weixin.qq.com/s/HMtAz6_unM1PrjfAzfwCUQ
  severity: high
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/admin/cores'
