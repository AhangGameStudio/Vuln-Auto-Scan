id: crawlab-file---------
info:
  author: pocscanner
  description: Crawlab 后台 /api/file接口 存在任意文件读取漏洞，攻击者通过漏洞就可以读取服务器中的任意文件
  name: Crawlab file 任意文件读取漏洞
  reference: []
  severity: medium
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/api/file'
