id: struts2-s2-007---------
info:
  author: pocscanner
  description: "参考 http://rickgray.me/2016/05/06/review-struts2-remote-command-execution-vulnerabilities.html\n\
    \n当配置了验证规则 `<ActionName>-validation.xml` 时，若类型验证转换出错，后端默认会将用户提交的表单值通过字符串拼接，然后执行一次\
    \ OGNL 表达式解析并返回。例如这里有一个 UserAction：\n\n```\n(...)\npublic class UserAction extends\
    \ ActionSupport {\n    private Integer age;\n    private String name;\n    private\
    \ String email;\n\n(...)\n```\n\n然后配置有 UserAction-validation.xml：\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\" ?>\n<!DOCTYPE validators PUBLIC\n    \"-//OpenSymphony\
    \ Group//XWork Vali"
  name: Struts2 S2-007 远程代码执行漏洞
  reference:
  - http://struts.apache.org/docs/s2-007.html
  severity: critical
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
