id: '---ns-asg-----index-php---------'
info:
  author: pocscanner
  description: 网康 NS-ASG安全网关 index.php文件存在远程命令执行漏洞，攻击者通过构造特殊的请求包可以获取服务器权限
  name: 网康 NS-ASG安全网关 index.php 远程命令执行漏洞
  reference: []
  severity: critical
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/protocol/index.php'
