id: nacos--------
info:
  author: pocscanner
  description: 2020年12月29日，Nacos官方在github发布的issue中披露Alibaba Nacos 存在一个由于不当处理User-Agent导致的未授权访问漏洞
    。通过该漏洞，攻击者可以进行任意操作，包括创建新用户并进行登录后操作。
  name: Nacos 未授权访问漏洞
  reference: []
  severity: high
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
