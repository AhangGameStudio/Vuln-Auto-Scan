id: struts2-s2-001---------
info:
  author: pocscanner
  description: '该漏洞因为用户提交表单数据并且验证失败时，后端会将用户之前提交的参数值使用 OGNL 表达式 %{value} 进行解析，然后重新填充到对应的表单数据中。例如注册或登录页面，提交失败后端一般会默认返回之前提交的数据，由于后端使用
    %{value} 对提交的数据执行了一次 OGNL 表达式解析，所以可以直接构造 Payload 进行命令执行.


    参考阅读：


    -  http://rickgray.me/2016/05/06/review-struts2-remote-command-execution-vulnerabilities.html'
  name: Struts2 S2-001 远程代码执行漏洞
  reference:
  - http://rickgray.me/2016/05/06/review-struts2-remote-command-execution-vulnerabilities.html
  severity: critical
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
