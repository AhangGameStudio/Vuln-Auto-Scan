id: alibaba-anyproxy-fetchbody---------
info:
  author: pocscanner
  description: Alibaba AnyProxy 低版本存在任意文件读取，通过漏洞，攻击者可以获取服务器敏感信息
  name: Alibaba AnyProxy fetchBody 任意文件读取漏洞
  reference: []
  severity: medium
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
