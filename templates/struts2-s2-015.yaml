id: struts2-s2-015---------
info:
  author: pocscanner
  description: "漏洞产生于配置了 Action 通配符 *，并将其作为动态值时，解析时会将其内容执行 OGNL 表达式，例如：\n\n```\n<package\
    \ name=\"S2-015\" extends=\"struts-default\">\n    <action name=\"*\" class=\"\
    com.demo.action.PageAction\">\n        <result>/{1}.jsp</result>\n    </action>\n\
    </package>\n```\n\n上述配置能让我们访问 name.action 时使用 name.jsp 来渲染页面，但是在提取 name 并解析时，对其执行了\
    \ OGNL 表达式解析，所以导致命令执行。在实践复现的时候发现，由于 name 值的位置比较特殊，一些特殊的字符如 / \" \\ 都无法使用（转义也不行），所以在利用该点进行远程命令执行时一些带有路径的命令可能无法执行成功。\n\
    \n还有需要说明的就是在 Struts 2.3.14.1 - Struts 2.3.14.2 的更新内容中，删除了 SecurityMemberAccess\
    \ 类中的 setAllowStat"
  name: Struts2 S2-015 远程代码执行漏洞
  reference:
  - http://struts.apache.org/docs/s2-015.html
  severity: critical
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/param.action'
