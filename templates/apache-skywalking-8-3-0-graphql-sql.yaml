id: apache-skywalking-8-3-0-graphql-sql----
info:
  author: pocscanner
  description: 'Apache Skywalking是一款针对分布式系统的应用程序性能监视工具，为微服务，云原生和基于容器（Docker，Kubernetes，Mesos）的体系结构而设计。


    在Apache Skywalking 8.3.0版本及以前的GraphQL接口中，存在一处H2 Database SQL注入漏洞。


    参考链接：


    - https://mp.weixin.qq.com/s/hB-r523_4cM0jZMBOt6Vhw

    - https://github.com/apache/skywalking/commit/0bd81495965d801315dd7417bb17333ae0eccf3b#diff-ec87a1cdf66cdb37574d9eafd4d72d99ed94a38c4a8ff2aa9c7b8daeff502a2c'
  name: Apache Skywalking 8.3.0 graphql SQL注入漏洞
  reference:
  - https://mp.weixin.qq.com/s/hB-r523_4cM0jZMBOt6Vhw
  - https://github.com/apache/skywalking/commit/0bd81495965d801315dd7417bb17333ae0eccf3b#diff-ec87a1cdf66cdb37574d9eafd4d72d99ed94a38c4a8ff2aa9c7b8daeff502a2c
  severity: low
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
