id: cnvd-2020-46552
info:
  author: pocscanner
  description: 深信服终端检测响应平台是深信服公司开发的一套EDR系统。攻击者利用该漏洞，可向目标服务器发送恶意构造的HTTP请求，从而获得目标服务器的权限，实现远程代码控制执行。
  name: 深信服 EDR c.php 远程命令执行漏洞 CNVD-2020-46552
  reference: []
  severity: critical
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}//xxx.xxx.xxx.xxx/tool/log/c.php'
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/tool/log/c.php'
