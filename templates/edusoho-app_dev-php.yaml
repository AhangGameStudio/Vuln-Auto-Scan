id: edusoho------app_dev-php-------
info:
  author: pocscanner
  description: 'EduSoho 教培系统是由杭州阔知网络科技研发的开源网校系统。


    通过向 /app_dev.php/_profiler/open 端点发送可以读取到 app/config/parameters.yml 文件的内容，拿到该文件中保存的
    secret 值以及数据库账号密码等敏感信息。'
  name: EduSoho 教培系统 app_dev.php 任意读取漏洞
  reference: []
  severity: low
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/app_dev.php'
