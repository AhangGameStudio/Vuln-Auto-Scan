id: nacos-secret-key-------------
info:
  author: pocscanner
  description: Alibaba Nacos 使用了固定的secret.key默认密钥，导致攻击者可以构造请求获取敏感信息，导致未授权访问漏洞
  name: Nacos secret.key 默认密钥 未授权访问漏洞
  reference: []
  severity: high
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
