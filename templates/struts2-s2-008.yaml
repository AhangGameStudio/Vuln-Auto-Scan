id: struts2-s2-008---------
info:
  author: pocscanner
  description: 'S2-008 涉及多个漏洞，Cookie 拦截器错误配置可造成 OGNL 表达式执行，但是由于大多 Web 容器（如 Tomcat）对
    Cookie 名称都有字符限制，一些关键字符无法使用使得这个点显得比较鸡肋。另一个比较鸡肋的点就是在 struts2 应用开启 devMode 模式后会有多个调试接口能够直接查看对象信息或直接执行命令，正如
    kxlzx 所提这种情况在生产环境中几乎不可能存在，因此就变得很鸡肋，但我认为也不是绝对的，万一被黑了专门丢了一个开启了 debug 模式的应用到服务器上作为后门也是有可能的。


    参考阅读：


    -  http://rickgray.me/2016/05/06/review-struts2-remote-command-execution-vulnerabilities.html


    漏洞详情:


    - http://struts.apache.org/docs/s2-008.html'
  name: Struts2 S2-008 远程代码执行漏洞
  reference:
  - http://rickgray.me/2016/05/06/review-struts2-remote-command-execution-vulnerabilities.html
  - http://struts.apache.org/docs/s2-008.html
  severity: critical
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/S2-008/devmode.action'
