id: apache-solr-remotestreaming------ssrf--
info:
  author: pocscanner
  description: 'Apache Solr 是一个开源的搜索服务器。在Apache Solr未开启认证的情况下，攻击者可直接构造特定请求开启特定配置，并最终造成SSRF或任意文件读取。


    参考链接：


    - https://mp.weixin.qq.com/s/3WuWUGO61gM0dBpwqTfenQ'
  name: Apache Solr RemoteStreaming 文件读取与SSRF漏洞
  reference:
  - https://mp.weixin.qq.com/s/3WuWUGO61gM0dBpwqTfenQ
  severity: medium
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/admin/cores'
