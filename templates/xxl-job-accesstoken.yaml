id: xxl-job----accesstoken-------
info:
  author: pocscanner
  description: 'XXL-JOB 是一个分布式任务调度平台，其核心设计目标是开发迅速、学习简单、轻量级、易扩展。现已开放源代码并接入多家公司线上产品线，开箱即用。XXL-JOB
    分为 admin 和 executor 两端，前者为后台管理页面，后者是任务执行的客户端。


    XXL-JOB 默认配置下，用于调度通讯的 accessToken 不是随机生成的，而是使用 application.properties 配置文件中的默认值。在实际使用中，如果没有修改默认值，攻击者可绕过认证调用 executor，执行任意命令，从而获取服务器权限。'
  name: XXL-JOB 默认 accessToken 身份绕过漏洞
  reference: []
  severity: critical
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
