id: mojarra-jsf-viewstate-------
info:
  author: pocscanner
  description: 'JavaServer Faces (JSF) 是一种用于构建 Web 应用程序的标准，Mojarra是一个实现了JSF的框架。在其2.1.29-08、2.0.11-04版本之前，没有对JSF中的ViewState进行加密，进而导致攻击者可以构造恶意的序列化ViewState对象对服务器进行攻击。


    参考链接：


    - https://www.alphabot.com/security/blog/2017/java/Misconfigured-JSF-ViewStates-can-lead-to-severe-RCE-vulnerabilities.html

    - https://www.exploit-db.com/docs/48126

    - https://www.synacktiv.com/ressources/JSF_ViewState_InYourFace.pdf'
  name: Mojarra JSF ViewState 反序列化漏洞
  reference:
  - https://www.alphabot.com/security/blog/2017/java/Misconfigured-JSF-ViewStates-can-lead-to-severe-RCE-vulnerabilities.html
  - https://www.exploit-db.com/docs/48126
  - https://www.synacktiv.com/ressources/JSF_ViewState_InYourFace.pdf
  severity: critical
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
