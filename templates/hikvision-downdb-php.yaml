id: hikvision------downdb-php---------
info:
  author: pocscanner
  description: 海康威视 联网网关 在页面 downdb.php 的参数fileName存在任意文件下载漏洞
  name: Hikvision 联网网关 downdb.php 任意文件读取漏洞
  reference: []
  severity: high
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/html/data/login.php'
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/html/localDomain/downdb.php'
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/localDomain/downdb.php'
