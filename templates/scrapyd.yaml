id: scrapyd--------
info:
  author: pocscanner
  description: 'scrapyd是爬虫框架scrapy提供的云服务，用户可以部署自己的scrapy包到云服务，默认监听在6800端口。如果攻击者能访问该端口，将可以部署恶意代码到服务器，进而获取服务器权限。


    参考链接：


    - https://www.leavesongs.com/PENETRATION/attack-scrapy.html'
  name: Scrapyd 未授权访问漏洞
  reference:
  - https://www.leavesongs.com/PENETRATION/attack-scrapy.html
  severity: high
requests:
- matchers:
  - status:
    - 200
    type: status
  method: GET
  path:
  - '{{BaseURL}}/'
