id: '--------------user_save-action---------'
info:
  author: pocscanner
  description: 大华 智慧园区综合管理平台存在未授权访问漏洞，攻击者通过构造特殊的请求包可以创建新用户，再利用文件上传漏洞获取服务器权限
  name: 大华 智慧园区综合管理平台 user_save.action 任意文件上传漏洞
  reference: []
  severity: high
requests:
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/upload/axqvssmz.jsp'
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/admin/user_save.action'
- matchers:
  - status:
    - 200
    - 301
    - 302
    - 403
    type: status
  method: GET
  path:
  - '{{BaseURL}}/admin/login_login.action'
